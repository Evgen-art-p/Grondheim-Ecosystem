<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Храм — Виктор</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Cormorant Garamond',serif}
.w{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:2rem}
.n{font-size:clamp(2.5rem,10vw,6rem);font-weight:300;letter-spacing:.12em;color:rgba(255,255,255,.8);opacity:0;animation:a 2s .5s forwards}
.p{font-size:clamp(1rem,2.5vw,1.4rem);font-weight:300;font-style:italic;color:rgba(255,255,255,.3);text-align:center;max-width:480px;line-height:1.8;opacity:0;animation:a 2s 1.5s forwards}
.t{position:absolute;bottom:6vh;font-size:.6rem;letter-spacing:.2em;color:rgba(255,255,255,.08);text-transform:uppercase;opacity:0;animation:a 1s 3s forwards}
@keyframes a{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="w">
  <span class="n">Виктор</span>
  <span class="p">Правда освободит. Если примешь.</span>
  <span class="t">здесь будет встреча</span>
</div>
</body>
</html>
