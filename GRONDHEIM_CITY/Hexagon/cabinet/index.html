<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Храм — Кабинет</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d0d0f;
  --bg2: #141418;
  --bg3: #1a1a20;
  --border: rgba(255,255,255,0.08);
  --text: rgba(255,255,255,0.88);
  --text-dim: rgba(255,255,255,0.5);
  --text-muted: rgba(255,255,255,0.22);
  --accent: #f59e0b;
  --accent-dim: rgba(245,158,11,0.15);
  --user-color: rgba(147,197,253,0.8);
  --ai-color: rgba(255,180,80,0.85);
  --danger: #ef4444;
  --radius: 8px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-ui: 'Inter', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: var(--font-ui);
  color: var(--text);
  overflow: hidden;
}

/* ── Layout: 3 columns ────────────────────────── */
.cabinet {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
  gap: 0;
}

/* ── Header ────────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}

.header-title {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--text-dim);
}
.header-title span { color: var(--accent); }

.header-controls {
  display: flex; gap: 8px; align-items: center;
}

.header-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  padding: 5px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
}
.header-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.header-btn.danger:hover { color: var(--danger); border-color: rgba(239,68,68,0.3); }

/* ── Model Selector ────────────────────────────── */
.model-selector {
  position: relative;
}

.model-current {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.model-current:hover { border-color: rgba(255,255,255,0.15); }

.model-current-name {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  letter-spacing: 0.03em;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.model-current-arrow {
  font-size: 0.5rem;
  color: var(--text-muted);
  transition: transform 0.2s;
}
.model-selector.open .model-current-arrow { transform: rotate(180deg); }

.model-current-price {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-muted);
  margin-left: 2px;
}

/* Dropdown */
.model-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  width: 300px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  z-index: 50;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.model-selector.open .model-dropdown { display: block; }

.model-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.model-option:hover { background: var(--bg3); }
.model-option.active { background: var(--accent-dim); }

.model-option-name {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text);
}
.model-option.active .model-option-name { color: var(--accent); }

.model-option-meta {
  display: flex; gap: 8px; align-items: center;
}

.model-option-price {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-muted);
}

.model-option-speed {
  font-size: 0.5rem;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
}
.speed-fast { background: rgba(34,197,94,0.15); color: rgba(34,197,94,0.7); }
.speed-mid { background: rgba(245,158,11,0.15); color: rgba(245,158,11,0.7); }
.speed-slow { background: rgba(239,68,68,0.1); color: rgba(239,68,68,0.5); }

.model-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

.model-custom {
  padding: 8px 12px;
}
.model-custom-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.model-custom-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 5px 8px;
  outline: none;
}
.model-custom-input::placeholder { color: var(--text-muted); }
.model-custom-input:focus { border-color: rgba(255,255,255,0.15); }

/* ── LEFT PANEL: Loader ──────────────────────── */
.loader-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg2);
  border-right: 1px solid var(--border);
}

.loader-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.loader-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--text);
}

.loader-count {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 10px;
}

/* Drop zone */
.drop-zone {
  margin: 12px;
  border: 1.5px dashed rgba(255,255,255,0.12);
  border-radius: var(--radius);
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  background: var(--bg);
  position: relative;
}
.drop-zone:hover,
.drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(245,158,11,0.04);
}

.drop-zone-icon {
  font-size: 1.6rem;
  margin-bottom: 8px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.drop-zone:hover .drop-zone-icon,
.drop-zone.drag-over .drop-zone-icon { opacity: 0.8; }

.drop-zone-text {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.drop-zone-text strong {
  color: var(--accent);
  cursor: pointer;
}

.drop-zone-formats {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-muted);
  margin-top: 8px;
}

.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

/* Files list */
.files-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}
.files-list::-webkit-scrollbar { width: 4px; }
.files-list::-webkit-scrollbar-track { background: transparent; }
.files-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.file-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  animation: fileIn 0.3s ease;
}
@keyframes fileIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.file-card-preview {
  width: 100%;
  height: 100px;
  object-fit: cover;
  display: block;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}

.file-card-icon-preview {
  width: 100%;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-size: 2rem;
  opacity: 0.4;
}

.file-card-info {
  padding: 8px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.file-card-name {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.file-card-size {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.file-card-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 0.65rem;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.file-card-remove:hover {
  color: var(--danger);
  background: rgba(239,68,68,0.1);
}

.files-empty {
  text-align: center;
  padding: 16px 8px;
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  line-height: 1.7;
}

/* Attached indicator in input area */
.attached-bar {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 0;
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--accent);
}
.attached-bar.visible { display: flex; }
.attached-bar-icon { opacity: 0.7; }
.attached-bar-text { opacity: 0.8; }

/* ── Main area (chat) ──────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

/* Chat messages */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

.msg {
  margin-bottom: 16px;
  max-width: 85%;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg--user { margin-left: auto; text-align: right; }

.msg-role {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.msg--user .msg-role { color: var(--user-color); }
.msg--ai .msg-role { color: var(--ai-color); }

.msg-text {
  font-size: 0.88rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
}
.msg--user .msg-text { color: rgba(220,230,245,0.75); }

.msg-time {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.msg-attachments {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.msg-attach-badge {
  font-family: var(--font-mono);
  font-size: 0.5rem;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 6px;
  border-radius: 4px;
}

.typing-indicator {
  color: var(--ai-color);
  font-size: 0.85rem;
  opacity: 0.5;
  animation: typePulse 1.2s ease-in-out infinite;
}
@keyframes typePulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

/* Empty state */
.chat-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
}

/* Input area */
.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}

.input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-field {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.5;
  padding: 10px 14px;
  resize: none;
  outline: none;
  min-height: 80px;
  max-height: 160px;
  transition: border-color 0.2s;
}
.input-field:focus { border-color: rgba(255,255,255,0.15); }
.input-field::placeholder { color: var(--text-muted); }

.send-btn {
  background: var(--accent-dim);
  border: 1px solid rgba(245,158,11,0.2);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  padding: 10px 18px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  align-self: flex-end;
  height: 38px;
}
.send-btn:hover { background: rgba(245,158,11,0.25); }
.send-btn:disabled { opacity: 0.3; cursor: default; }

.input-hint {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: right;
}

/* ── Sidebar ───────────────────────────────────── */
.sidebar {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg2);
}

.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.sidebar-tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 12px 8px;
  cursor: pointer;
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.sidebar-tab:hover { color: var(--text-dim); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.06) transparent;
}

.tab-panel { display: none; padding: 12px; }
.tab-panel.active { display: block; }

/* Prompts */
.prompt-folder { margin-bottom: 8px; }
.prompt-folder-header {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text);
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.15s;
  user-select: none;
}
.prompt-folder-header:hover { background: var(--bg3); }

.prompt-folder-arrow {
  font-size: 0.55rem;
  color: var(--text-dim);
  transition: transform 0.2s;
}
.prompt-folder.open .prompt-folder-arrow { transform: rotate(90deg); }

.prompt-folder-items { display: none; padding-left: 12px; }
.prompt-folder.open .prompt-folder-items { display: block; }

.prompt-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 8px;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  margin: 2px 0;
}
.prompt-item:hover { background: var(--bg3); color: var(--text); }
.prompt-item.active { background: var(--accent-dim); color: var(--accent); }

.prompt-item-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.prompt-item:hover .prompt-item-actions { opacity: 1; }

.prompt-action {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 0.6rem;
  cursor: pointer;
  padding: 2px;
  border-radius: 3px;
}
.prompt-action:hover { color: var(--text); background: rgba(255,255,255,0.05); }

/* Active prompt bar */
.active-prompt-bar {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--accent);
  background: var(--accent-dim);
  display: none;
  align-items: center;
  justify-content: space-between;
}
.active-prompt-bar.visible { display: flex; }
.active-prompt-bar button {
  background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.7rem;
}

/* Archive */
.archive-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.archive-item:hover { background: var(--bg3); }

.archive-item-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.archive-item-meta { display: flex; justify-content: space-between; align-items: center; }
.archive-item-date {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  color: var(--text-muted);
}

.archive-item-delete {
  background: none; border: none;
  color: var(--text-muted);
  font-size: 0.6rem;
  cursor: pointer;
  opacity: 0;
  transition: all 0.15s;
  padding: 2px 4px;
  border-radius: 3px;
}
.archive-item:hover .archive-item-delete { opacity: 1; }
.archive-item-delete:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

.archive-empty {
  padding: 24px 12px;
  text-align: center;
  font-size: 0.65rem;
  color: var(--text-muted);
}

/* ── Prompt preview modal ──────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: min(600px, 90vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text);
}
.modal-close {
  background: none; border: none; color: var(--text-dim);
  font-size: 0.9rem; cursor: pointer;
}
.modal-body {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}
.modal-prompt-text {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
}
</style>
</head>
<body>

<div class="cabinet">
  <!-- Header -->
  <div class="header">
    <div class="header-title">храм / <span>кабинет</span></div>
    <div class="header-controls">
      <!-- Model Selector -->
      <div class="model-selector" id="model-selector">
        <div class="model-current" id="model-current">
          <span class="model-current-name" id="model-current-name">—</span>
          <span class="model-current-price" id="model-current-price"></span>
          <span class="model-current-arrow">▼</span>
        </div>
        <div class="model-dropdown" id="model-dropdown"></div>
      </div>

      <button class="header-btn" id="btn-save" title="Сохранить чат в архив">💾 сохранить</button>
      <button class="header-btn" id="btn-web" title="Веб-инструменты" style="opacity:0.4;cursor:default">🌐 web</button>
      <button class="header-btn danger" id="btn-clear" title="Очистить чат">✕ очистить</button>
    </div>
  </div>

  <!-- LEFT: File Loader -->
  <div class="loader-panel">
    <div class="loader-header">
      <span class="loader-title">📎 Файлы</span>
      <span class="loader-count" id="loader-count">0</span>
    </div>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.md,.csv,.json">
      <div class="drop-zone-icon">⇧</div>
      <div class="drop-zone-text">
        перетащи сюда или <strong>выбери</strong>
      </div>
      <div class="drop-zone-formats">img · pdf · txt · md · csv · json</div>
    </div>

    <div class="files-list" id="files-list">
      <div class="files-empty" id="files-empty">
        загруженные файлы<br>появятся здесь
      </div>
    </div>
  </div>

  <!-- CENTER: Chat -->
  <div class="main">
    <div class="active-prompt-bar" id="active-prompt-bar">
      <span id="active-prompt-name">—</span>

// Drag & drop
$dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  $dropZone.classList.add('drag-over');
});
$dropZone.addEventListener('dragleave', () => {
  $dropZone.classList.remove('drag-over');
});
$dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  $dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

// Click to select
$fileInput.addEventListener('change', (e) => {
  handleFiles(e.target.files);
  e.target.value = '';
});

async function handleFiles(fileList) {
  for (const file of fileList) {
    const isImage = file.type.startsWith('image/');
    const isPdf = file.type === 'application/pdf';
    const isText = /\.(txt|md|csv|json)$/i.test(file.name) || file.type.startsWith('text/');

    if (!isImage && !isPdf && !isText) continue;

    const id = Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    const base64 = await fileToBase64(file);

    let mediaType = file.type || 'application/octet-stream';
    if (!mediaType || mediaType === 'application/octet-stream') {
      if (file.name.endsWith('.md')) mediaType = 'text/markdown';
      else if (file.name.endsWith('.csv')) mediaType = 'text/csv';
      else if (file.name.endsWith('.json')) mediaType = 'application/json';
      else if (file.name.endsWith('.txt')) mediaType = 'text/plain';
    }

    let textContent = null;
    if (isText) {
      textContent = await file.text();
    }

    uploadedFiles.push({
      id, name: file.name, size: file.size, type: file.type,
      base64, mediaType, isImage, isPdf, isText, textContent,
    });
  }

  renderFilesList();
  updateAttachedBar();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = () => reject(new Error('File read error'));
    reader.readAsDataURL(file);
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function removeFile(id) {
  uploadedFiles = uploadedFiles.filter(f => f.id !== id);
  renderFilesList();
  updateAttachedBar();
}

function renderFilesList() {
  $loaderCount.textContent = uploadedFiles.length;

  if (uploadedFiles.length === 0) {
    $filesEmpty.style.display = 'block';
    // Remove all file cards
    $filesList.querySelectorAll('.file-card').forEach(el => el.remove());
    return;
  }

  $filesEmpty.style.display = 'none';

  // Rebuild
  const existing = new Set();
  $filesList.querySelectorAll('.file-card').forEach(el => {
    const id = el.dataset.id;
    if (!uploadedFiles.find(f => f.id === id)) {
      el.remove();
    } else {
      existing.add(id);
    }
  });

  uploadedFiles.forEach(f => {
    if (existing.has(f.id)) return;

    const card = document.createElement('div');
    card.className = 'file-card';
    card.dataset.id = f.id;

    let previewHtml;
    if (f.isImage) {
      previewHtml = `<img class="file-card-preview" src="data:${f.mediaType};base64,${f.base64}" alt="${escapeHtml(f.name)}">`;
    } else if (f.isPdf) {
      previewHtml = `<div class="file-card-icon-preview">📄</div>`;
    } else {
      previewHtml = `<div class="file-card-icon-preview">📝</div>`;
    }

    card.innerHTML = `
      ${previewHtml}
      <div class="file-card-info">
        <span class="file-card-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</span>
        <span class="file-card-size">${formatSize(f.size)}</span>
        <button class="file-card-remove" data-id="${f.id}" title="Удалить">✕</button>
      </div>
    `;

    card.querySelector('.file-card-remove').addEventListener('click', () => removeFile(f.id));
    $filesList.appendChild(card);
  });
}

function updateAttachedBar() {
  const count = uploadedFiles.length;
  if (count > 0) {
    $attachedBar.classList.add('visible');
    const word = count === 1 ? 'файл прикреплён' : count < 5 ? 'файла прикреплено' : 'файлов прикреплено';
    $attachedText.textContent = `${count} ${word}`;
  } else {
    $attachedBar.classList.remove('visible');
  }
}

// Build multimodal content array for API
function buildUserContent(text) {
  if (uploadedFiles.length === 0) return text;

  const content = [];

  uploadedFiles.forEach(f => {
    if (f.isImage) {
      content.push({
        type: 'image_url',
        image_url: { url: `data:${f.mediaType};base64,${f.base64}` }
      });
    } else if (f.isPdf) {
      // PDF as base64 (OpenRouter supports this for vision models)
      content.push({
        type: 'image_url',
        image_url: { url: `data:application/pdf;base64,${f.base64}` }
      });
    } else if (f.isText && f.textContent) {
      content.push({
        type: 'text',
        text: `[Файл: ${f.name}]\n${f.textContent}`
      });
    }
  });

  content.push({ type: 'text', text });

  return content;
}

// Get file names for display
function getAttachedNames() {
  return uploadedFiles.map(f => f.name);
}

async function send() {

// ── API call (with tool use) ─────────────────────
async function callAPI() {
  const messages = [];

  // System prompt + knowledge injection
  if (systemPrompt) {
    let fullSystem = systemPrompt;
    if (activeKnowledge) {
      fullSystem += `\n\n[БАЗА ЗНАНИЙ]\n${activeKnowledge}`;
    }
    messages.push({ role: 'system', content: fullSystem });
  }

  messages.push(...chatHistory);

  const body = {
    model: currentModel,
    messages,
    max_tokens: CONFIG.api.maxTokens,
    temperature: CONFIG.api.temperature,
  };

  // Attach tools if enabled and key is set
  if (TOOLS_ENABLED && TAVILY_API_KEY) {
    body.tools = TOOLS_SCHEMA;
  }

  const res = await fetch(CONFIG.api.endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${CONFIG.api.apiKey}`,
      'HTTP-Referer': window.location.href,
      'X-Title': 'temple - cabinet',
    },
    body: JSON.stringify(body),
  });

  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  const data = await res.json();

  const choice = data.choices?.[0];
  if (!choice) return '...';

  // ── Handle tool calls ──────────────────────────
  if (choice.finish_reason === 'tool_calls' || choice.message?.tool_calls?.length) {
    const toolCalls = choice.message.tool_calls;
    const assistantMsg = { role: 'assistant', content: choice.message.content || '', tool_calls: toolCalls };

    // Execute each tool
    const toolResults = [];
    for (const tc of toolCalls) {
      const fn = tc.function.name;
      const args = JSON.parse(tc.function.arguments || '{}');
      let result = '';

      try {
        if (fn === 'web_search') {
          result = await execWebSearch(args.query);
        } else if (fn === 'fetch_url') {
          result = await execFetchUrl(args.url);
        } else {
          result = `Неизвестный инструмент: ${fn}`;
        }
      } catch (err) {
        result = `Ошибка: ${err.message}`;
      }

      toolResults.push({
        role: 'tool',
        tool_call_id: tc.id,
        content: result,
      });
    }

    // Second call with tool results
    const messages2 = [];
    if (systemPrompt) {
      let fullSystem = systemPrompt;
      if (activeKnowledge) fullSystem += `\n\n[БАЗА ЗНАНИЙ]\n${activeKnowledge}`;
      messages2.push({ role: 'system', content: fullSystem });
    }
    messages2.push(...chatHistory);
    messages2.push(assistantMsg);
    messages2.push(...toolResults);

    const res2 = await fetch(CONFIG.api.endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CONFIG.api.apiKey}`,
        'HTTP-Referer': window.location.href,
        'X-Title': 'temple - cabinet',
      },
      body: JSON.stringify({
        model: currentModel,
        messages: messages2,
        max_tokens: CONFIG.api.maxTokens,
        temperature: CONFIG.api.temperature,
      }),
    });

    if (!res2.ok) throw new Error(`${res2.status} ${res2.statusText}`);
    const data2 = await res2.json();
    return data2.choices?.[0]?.message?.content?.trim() || '...';
  }

  return choice.message?.content?.trim() || '...';
}

// ── Web Search via Tavily ───────────────────────
async function execWebSearch(query) {
  const res = await fetch('https://api.tavily.com/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      api_key: TAVILY_API_KEY,
      query,
      max_results: 5,
      include_answer: true,
      search_depth: 'basic',
    }),
  });

  if (!res.ok) throw new Error(`Tavily: ${res.status}`);
  const data = await res.json();

  let out = '';
  if (data.answer) out += `Краткий ответ: ${data.answer}\n\n`;

  if (data.results?.length) {
    out += 'Результаты поиска:\n';
    data.results.forEach((r, i) => {
      out += `\n[${i + 1}] ${r.title}\n${r.url}\n${r.content?.substring(0, 500) || ''}\n`;
    });
  }

  return out || 'Ничего не найдено.';
}

// ── Fetch URL ───────────────────────────────────
async function execFetchUrl(url) {
  // Tavily extract endpoint for clean text
  if (TAVILY_API_KEY) {
    try {
      const res = await fetch('https://api.tavily.com/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_key: TAVILY_API_KEY,
          urls: [url],
        }),
      });

      if (res.ok) {
        const data = await res.json();
        const content = data.results?.[0]?.raw_content || data.results?.[0]?.text || '';
        if (content) return content.substring(0, 8000);
      }
    } catch (e) {
      console.warn('[Fetch] Tavily extract failed, trying direct fetch:', e);
    }
  }

  // Fallback: direct fetch (may be blocked by CORS)
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status}`);
    const text = await res.text();
    // Strip HTML tags for readability
    const clean = text.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '')
                      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
                      .replace(/<[^>]+>/g, ' ')
                      .replace(/\s+/g, ' ')
                      .trim();
    return clean.substring(0, 8000) || 'Страница пуста.';
  } catch (e) {
    return `Не удалось загрузить: ${e.message}`;
  }
}

// ── Chat UI ──────────────────────────────────────
function appendMsg(role, text, attachedNames = []) {
  const div = document.createElement('div');
  div.className = `msg msg--${role === 'user' ? 'user' : 'ai'}`;
  const time = new Date().toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });

  let attachHtml = '';
  if (attachedNames.length > 0) {
    attachHtml = `<div class="msg-attachments">${attachedNames.map(n => `<span class="msg-attach-badge">📎 ${escapeHtml(n)}</span>`).join('')}</div>`;
  }

  div.innerHTML = `
    <div class="msg-role">${role === 'user' ? 'ты' : 'модель'}</div>
    <div class="msg-text">${escapeHtml(text)}</div>
    ${attachHtml}
    <div class="msg-time">${time}</div>
  `;
  $chat.appendChild(div);
  $chat.scrollTop = $chat.scrollHeight;
}

function showTyping(label) {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.textContent = label || '···';
  $chat.appendChild(div);
  $chat.scrollTop = $chat.scrollHeight;
  return div;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Clear ────────────────────────────────────────
$btnClear.addEventListener('click', () => {
  chatHistory = [];
  $chat.innerHTML = '';

// ── Save to archive ──────────────────────────────
$btnSave.addEventListener('click', () => {
  if (chatHistory.length === 0) return;
  const archive = getArchive();
  const firstMsg = chatHistory.find(m => m.role === 'user')?.content;
  const title = typeof firstMsg === 'string' ? firstMsg : (firstMsg?.find(c => c.type === 'text')?.text || 'без названия');
  archive.unshift({
    id: Date.now(),
    title: title.substring(0, 60),
    prompt: activePromptId || 'без промпта',
    model: currentModel,
    date: new Date().toISOString(),
    messages: [...chatHistory],
    systemPrompt,
  });
  localStorage.setItem('temple_cabinet_archive', JSON.stringify(archive));
  renderArchive();
  $btnSave.textContent = '✓ сохранено';
  setTimeout(() => { $btnSave.textContent = '💾 сохранить'; }, 1500);
});

// ── Archive ──────────────────────────────────────
function getArchive() {
  try { return JSON.parse(localStorage.getItem('temple_cabinet_archive') || '[]'); }
  catch { return []; }
}

function renderArchive() {
  const archive = getArchive();
  if (archive.length === 0) {
    $panelAr.innerHTML = '<div class="archive-empty">архив пуст</div>';
    return;
  }
  $panelAr.innerHTML = archive.map(item => `
    <div class="archive-item" data-id="${item.id}">
      <div class="archive-item-title">${escapeHtml(item.title)}</div>
      <div class="archive-item-meta">
        <span class="archive-item-date">${new Date(item.date).toLocaleDateString('ru', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}</span>
        <button class="archive-item-delete" data-id="${item.id}" title="Удалить">✕</button>
      </div>
    </div>
  `).join('');

  $panelAr.querySelectorAll('.archive-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('archive-item-delete')) return;
      const item = archive.find(a => a.id === parseInt(el.dataset.id));
      if (!item) return;
      chatHistory = [...item.messages];
      systemPrompt = item.systemPrompt || '';
      if (item.model) { currentModel = item.model; updateModelDisplay(); renderModelSelector(); }
      $chat.innerHTML = '';
      $chatEmpty.style.display = 'none';
      chatHistory.forEach(m => {
        const txt = typeof m.content === 'string' ? m.content : (m.content?.find(c => c.type === 'text')?.text || '...');
        appendMsg(m.role, txt);
      });
    });
  });

  $panelAr.querySelectorAll('.archive-item-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const filtered = archive.filter(a => a.id !== parseInt(btn.dataset.id));
      localStorage.setItem('temple_cabinet_archive', JSON.stringify(filtered));
      renderArchive();
    });
  });
}

// ── Prompts panel ────────────────────────────────
function renderPrompts() {
  $panelPr.innerHTML = PROMPTS.folders.map(folder => `
    <div class="prompt-folder open" data-folder="${folder.id}">
      <div class="prompt-folder-header">
        <span class="prompt-folder-arrow">▶</span>
        ${folder.name}
      </div>
      <div class="prompt-folder-items">
        ${folder.prompts.map(p => `
          <div class="prompt-item" data-prompt-id="${p.id}" data-file="${p.file}" data-knowledge="${p.knowledge || ''}">
            <span>${p.name}${p.knowledge ? ' <span style="opacity:0.4;font-size:0.5rem" title="База знаний подключена">📚</span>' : ''}</span>
            <div class="prompt-item-actions">
              <button class="prompt-action" data-action="preview" data-file="${p.file}" data-name="${p.name}" title="Просмотр">👁</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  $panelPr.querySelectorAll('.prompt-folder-header').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });

  $panelPr.querySelectorAll('.prompt-item').forEach(item => {
    item.addEventListener('click', async (e) => {
      if (e.target.closest('.prompt-action')) return;
      $panelPr.querySelectorAll('.prompt-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      activePromptId = item.dataset.promptId;

      const knowledgeFile = item.dataset.knowledge || '';
      const [promptText, knowledgeText] = await Promise.all([
        loadPrompt(item.dataset.file),
        loadKnowledge(knowledgeFile),
      ]);

      systemPrompt = promptText;
      activeKnowledge = knowledgeText;

      const label = item.querySelector('span').textContent;
      $activeName.textContent = knowledgeText
        ? `${label}  📚`
        : label;
      $activeBar.classList.add('visible');
    });
  });

  $panelPr.querySelectorAll('.prompt-action[data-action="preview"]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const text = await loadPrompt(btn.dataset.file);
      $modalTitle.textContent = btn.dataset.name;
      $modalText.textContent = text;
      $modal.classList.add('visible');
    });
  });
}

$btnDesel.addEventListener('click', () => {
  systemPrompt = ''; activePromptId = null; activeKnowledge = '';
  $activeBar.classList.remove('visible');
  $panelPr.querySelectorAll('.prompt-item').forEach(i => i.classList.remove('active'));
});

$modalClose.addEventListener('click', () => $modal.classList.remove('visible'));
$modal.addEventListener('click', (e) => { if (e.target === $modal) $modal.classList.remove('visible'); });

async function loadPrompt(file) {
  if (promptCache[file]) return promptCache[file];
  try {
    const res = await fetch(`prompts/${file}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const text = await res.text();
    promptCache[file] = text;
    return text;
  } catch (err) {
    console.warn('[Кабинет] Промпт не загружен:', file, err);
    return `⚠ Не удалось загрузить: ${file}`;
  }
}

async function loadKnowledge(file) {
  if (!file) return '';
  if (knowledgeCache[file]) return knowledgeCache[file];
  try {
    const res = await fetch(`prompts/${file}`);
    if (!res.ok) throw new Error(`${res.status}`);
    const text = await res.text();
    knowledgeCache[file] = text;
    return text;
  } catch (err) {
    console.warn('[Кабинет] Knowledge не загружен:', file, err);
    return '';
  }
}
</script>
